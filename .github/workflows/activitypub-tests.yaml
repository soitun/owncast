name: ActivityPub Tests

on:
  push:
    branches:
      - develop
    paths:
      - "activitypub/**"
      - "core/chat/**"
      - "config/**"
      - "main.go"
      - "webserver/**"
      - "auth/**"
      - "persistence/userrepository/**"
      - "test/automated/activitypub/**"
      - ".github/workflows/activitypub-tests.yaml"
  pull_request:
    paths:
      - "activitypub/**"
      - "core/chat/**"
      - "config/**"
      - "main.go"
      - "webserver/**"
      - "auth/**"
      - "persistence/userrepository/**"
      - "test/automated/activitypub/**"
      - ".github/workflows/activitypub-tests.yaml"

jobs:
  federation-test:
    runs-on: ubuntu-latest
    steps:
      - id: skip_check
        uses: fkirc/skip-duplicate-actions@v5
        with:
          concurrent_skipping: "same_content_newer"

      - name: Check out repository code
        uses: actions/checkout@v6

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version: "1.26.4"
          cache: true

      - name: Install Caddy
        run: |
          sudo apt-get update
          sudo apt-get install -y debian-keyring debian-archive-keyring apt-transport-https curl
          curl -1sLf 'https://dl.cloudsmith.io/public/caddy/stable/gpg.key' | sudo gpg --dearmor -o /usr/share/keyrings/caddy-stable-archive-keyring.gpg
          curl -1sLf 'https://dl.cloudsmith.io/public/caddy/stable/debian.deb.txt' | sudo tee /etc/apt/sources.list.d/caddy-stable.list
          sudo apt-get update
          sudo apt-get install -y caddy

      - name: Install dependencies
        run: |
          sudo apt-get install -y snac2 ffmpeg

      - name: Run setup
        env:
          # Authenticates the mkcert download in setup.sh against github.com
          # to avoid the anonymous, shared-per-IP rate limit on CI runners.
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          cd test/automated/activitypub
          # Preserve GITHUB_TOKEN across sudo (sudo strips env by default) so
          # setup.sh's github.com downloads use it.
          sudo --preserve-env=GITHUB_TOKEN ./setup.sh

      - name: Run federation test
        run: |
          cd test/automated/activitypub
          CI=true USER_COUNT=20 ./test-federation.sh

