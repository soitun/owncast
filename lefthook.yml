# This is the configuration file for pre-push and pre-commit hooks that can
# be optionally run to assist in Owncast development.
# This file should be placed in the root of the Owncast repository.
# It will perform code linting, formatting, run tests, and other checks.
#
# To enable, run:
#   make install-hooks
#
# To learn more: https://lefthook.dev/usage/commands.html#lefthook-install
#
# To test the install run: ./bin/lefthook run test
# And you should see the Go and JS tests run.


pre-push:
  parallel: true
  commands:
    go-test:
      glob: '*.{go,mod,sum}'
      run: go test ./... > /dev/null
    web-build:
      root: web/
      run: npm run build
    # End-to-end plugin suite: builds the SDK example plugins, installs them
    # into a real Owncast instance, and asserts on the live HTTP/API surface.
    # `go test` and the web build don't cover this — a change to the plugin
    # API contract (e.g. moving plugin CSS out of /api/config customStyles
    # into a separate pluginStyles field) leaves both green while breaking
    # these tests, which previously only ran in CI. Scoped to plugin code so
    # it doesn't fire on unrelated Go changes: the plugin host/services, the
    # integration tests themselves, and the two handlers that serialize
    # plugin output into the endpoints these tests hit (/api/config and
    # /customjavascript). Heavy (clones the SDK, downloads ffmpeg, builds the
    # server); set PLUGIN_SDK_DIR to a local SDK checkout to skip the clone,
    # or push with --no-verify to bypass.
    plugin-integration:
      glob:
        - 'pluginhost/**'
        - 'services/plugins/**'
        - 'test/automated/plugins/**'
        - 'webserver/handlers/config.go'
        - 'webserver/handlers/customJavascript.go'
      run: cd test/automated/plugins && ./run.sh

pre-commit:
  parallel: true
  commands:
    js-linter:
      glob: '*.{js,ts,jsx,tsx}'
      root: web/
      run: npx --yes eslint --fix {staged_files}
      stage_fixed: true
    prettier:
      glob: '*.{js,ts,jsx,tsx,css,scss}'
      run: npx --yes prettier --write {staged_files}
      stage_fixed: true
    css-linter:
      glob: '*.{css,scss}'
      root: web/
      # --allow-empty-input: when the only staged CSS is generated output
      # (e.g. styles/variables.css, public/styles/plugin.css), every file is
      # skipped via .stylelintignore. Without this flag stylelint exits
      # non-zero with AllFilesIgnoredError and aborts the commit.
      run: npx --yes stylelint --fix --allow-empty-input {staged_files}
      stage_fixed: true
    js-unused:
      glob: '*.{js,ts,jsx,tsx}'
      root: web/
      run: npx --yes knip --include dependencies,files,exports
    go-fmt:
      glob: '*.go'
      run: ./bin/gofumpt -l -w {staged_files}
      stage_fixed: true
    golangci-lint:
      glob: '*.go'
      # The tools/ subdirectory is its own Go module (dev-tooling pins);
      # excluding it avoids golangci-lint typechecker errors when staged
      # changes touch it.
      run: ./bin/golangci-lint run $(echo {staged_files} | tr ' ' '\n' | xargs -n1 dirname | sort -u | grep -vE '^tools$|^tools/' || true)
    go-test:
      glob: '*.go'
      run: go test ./... > /dev/null
    shellcheck:
      glob: '*.sh'
      run: ./bin/shellcheck {staged_files}
    js-test:
      glob: '*.{js,ts,jsx}'
      root: web/
      run: npm test

test:
  parallel: true
  commands:
    web:
      root: web/
      run: npm test
    go:
      run: go test ./... > /dev/null

lint:
  parallel: true
  commands:
    golangci-lint:
      glob: '*.go'
      run: ./bin/golangci-lint run ./...

# Validate commit messages per https://www.conventionalcommits.org/en/v1.0.0/
# Install commitlint into your global npm path if you want to use it.
# npm install -g @commitlint/{config-conventional,cli}
commit-msg:
  commands:
    'lint commit message':
      run: if command -v commitlint >/dev/null 2>&1; then commitlint --edit {1}; fi
